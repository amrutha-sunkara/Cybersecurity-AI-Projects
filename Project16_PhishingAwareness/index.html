<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phishing Awareness Generator</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

    <div class="header">
        <h1>
            <i class="fa-solid fa-fish-fins"></i>
            Phishing Awareness Generator
        </h1>

        <p>
            Generate cybersecurity awareness posters
            and educational video scripts.
        </p>
    </div>

    <div class="card">

        <div class="input-group">

            <label>
                <i class="fa-solid fa-layer-group"></i>
                Select Format
            </label>

            <select id="format">
                <option value="poster">Poster</option>
                <option value="video">Video Script</option>
            </select>

        </div>

        <div class="input-group">

            <label>
                <i class="fa-solid fa-triangle-exclamation"></i>
                Phishing Scenario
            </label>

            <textarea
                id="scenario"
                placeholder="Example:
Fake SBI bank email requesting OTP verification">
            </textarea>

        </div>

        <button onclick="generateContent()">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            Generate Content
        </button>

    </div>

    <div class="output-card">

        <h2>
            <i class="fa-solid fa-file-lines"></i>
            Generated Awareness Content
        </h2>

        <div id="result"></div>

    </div>

    <div class="footer">
        Cybersecurity & Responsible AI Project
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
