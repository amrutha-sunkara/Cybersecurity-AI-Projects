
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Footprint Mapping Generator</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="main-container">

        <div class="header">
            <h1>
                <i class="fa-solid fa-shield-halved"></i>
                Digital Footprint Mapping Generator
            </h1>

            <p>
                Analyze your online exposure and understand
                your privacy risks.
            </p>
        </div>

        <div class="glass-card">

            <div class="input-section">

                <div class="input-group">
                    <label>
                        <i class="fa-solid fa-user"></i>
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="username"
                        placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>
                        <i class="fa-solid fa-globe"></i>
                        Platforms & Data Shared
                    </label>

                    <textarea
                        id="platforms"
                        placeholder="Instagram - Photos, Email, Location
Facebook - Phone Number, Photos
Google - Search History, Contacts">
                    </textarea>
                </div>

                <button onclick="generateReport()">
                    <i class="fa-solid fa-chart-line"></i>
                    Generate Report
                </button>

            </div>

            <div id="result" class="result-box"></div>

        </div>

        <div class="footer">
            Cybersecurity & Responsible AI Project
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
